<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能健身教练 · 训练记录</title>
<style>
  :root{
    --green:#16a34a; --green-d:#15803d; --green-l:#dcfce7; --green-xl:#f0fdf4;
    --bg:#f4f9f5; --card:#ffffff; --txt:#17301f; --sub:#71917d;
    --line:#e3efe7; --red:#ef4444; --red-l:#fef2f2; --amber:#d97706; --amber-l:#fff7ed;
    --shadow:0 3px 14px rgba(22,163,74,.07);
    --shadow-h:0 10px 28px rgba(22,163,74,.15);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:
      radial-gradient(600px 300px at 90% -50px, rgba(34,197,94,.10), transparent 70%),
      radial-gradient(500px 260px at -60px 20%, rgba(34,197,94,.07), transparent 70%),
      var(--bg);
    color:var(--txt);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif;
    padding:18px; max-width:680px; margin:0 auto; -webkit-tap-highlight-color:transparent;
    min-height:100vh;
  }

  /* ══ 顶部横幅 ══ */
  header{
    background:linear-gradient(135deg,#22c55e 0%,#16a34a 55%,#15803d 100%);
    color:#fff; border-radius:20px; padding:22px;
    box-shadow:0 10px 26px rgba(21,128,61,.30);
    position:relative; overflow:hidden;
  }
  header::before, header::after{
    content:""; position:absolute; border-radius:50%; background:rgba(255,255,255,.12);
  }
  header::before{ width:170px; height:170px; right:-50px; top:-60px; }
  header::after { width:90px;  height:90px;  right:70px;  bottom:-45px; background:rgba(255,255,255,.08); }
  header h1{ font-size:22px; font-weight:800; letter-spacing:.5px; }
  header .tip{ font-size:12.5px; opacity:.92; margin-top:6px; letter-spacing:.3px; }
  .tools{ position:absolute; right:16px; top:16px; display:flex; gap:8px; z-index:2; }
  .tbtn{
    background:rgba(255,255,255,.18); color:#fff;
    border:1px solid rgba(255,255,255,.4);
    padding:7px 15px; border-radius:10px; font-size:13px; font-weight:600;
    cursor:pointer; backdrop-filter:blur(4px);
    transition:background .2s, transform .15s;
  }
  .tbtn:hover{ background:rgba(255,255,255,.3); }
  .tbtn:active{ transform:scale(.95); }
  .tbtn.on{ background:#fff; color:var(--green-d); border-color:#fff; }
  /* 清空按钮只在管理模式显示, 防误触 */
  .tbtn.danger{ background:rgba(239,68,68,.28); border-color:rgba(255,255,255,.45); display:none; }
  body.manage .tbtn.danger{ display:inline-block; }
  .tbtn.danger:hover{ background:rgba(239,68,68,.5); }

  /* ══ 汇总卡 ══ */
  .summary{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:16px 0; }
  .box{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:14px 8px; text-align:center; box-shadow:var(--shadow);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .box:hover{ transform:translateY(-3px); box-shadow:var(--shadow-h); }
  .box .val{ font-size:23px; font-weight:800; color:var(--green); line-height:1.15;
             font-variant-numeric:tabular-nums; }
  .box .lbl{ font-size:11.5px; color:var(--sub); margin-top:5px; }

  /* ══ 筛选 ══ */
  .filterbar{ position:relative; margin-bottom:14px; }
  select{
    width:100%; background:var(--card); color:var(--txt);
    border:1px solid var(--line); border-radius:14px; padding:13px 16px;
    font-size:15px; font-weight:600; box-shadow:var(--shadow);
    appearance:none; -webkit-appearance:none; cursor:pointer; outline:none;
  }
  select:focus{ border-color:var(--green); }
  .filterbar::after{
    content:"▾"; position:absolute; right:18px; top:50%; transform:translateY(-50%);
    color:var(--green); pointer-events:none; font-size:14px;
  }

  /* ══ 记录卡片 ══ */
  .item{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    margin-bottom:12px; box-shadow:var(--shadow);
    transition:box-shadow .25s ease, border-color .25s ease;
    opacity:0; transform:translateY(12px);
    animation:fadeUp .5s cubic-bezier(.22,.8,.35,1) forwards;
    overflow:hidden;
  }
  @keyframes fadeUp{ to{ opacity:1; transform:translateY(0); } }
  .item:hover{ box-shadow:var(--shadow-h); }
  .item.open{ border-color:#bbe8c9; }

  .head{
    display:flex; align-items:center; gap:12px;
    padding:15px 16px; cursor:pointer; user-select:none;
  }
  .badge{
    width:46px; height:46px; border-radius:13px; flex-shrink:0;
    background:linear-gradient(145deg,var(--green-l),#bff0d0);
    color:var(--green-d);
    display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .info{ flex:1; min-width:0; }
  .info .name{ font-size:16px; font-weight:700; }
  .info .name b{ color:var(--green-d); }
  .info .meta{ font-size:12.5px; color:var(--sub); margin-top:3px; }
  .chev{
    color:#9dbfa9; font-size:12px; flex-shrink:0;
    transition:transform .4s cubic-bezier(.22,.8,.35,1);
  }
  .item.open .chev{ transform:rotate(180deg); color:var(--green); }

  /* 每条数据的专属删除按钮(管理模式滑出) */
  .del{
    background:var(--red-l); color:var(--red); border:1px solid #fecaca;
    border-radius:10px; font-size:13px; font-weight:700; cursor:pointer;
    flex-shrink:0; white-space:nowrap; overflow:hidden;
    max-width:0; opacity:0; padding:7px 0; border-width:0; margin-left:-6px;
    transition:max-width .35s cubic-bezier(.22,.8,.35,1), opacity .25s ease,
               padding .35s ease, margin .35s ease, background .2s, color .2s;
  }
  body.manage .del{ max-width:80px; opacity:1; padding:7px 13px; border-width:1px; margin-left:0; }
  .del:hover{ background:var(--red); color:#fff; }
  .del:disabled{ opacity:.5; cursor:wait; }

  /* 展开动画: grid-rows 0fr→1fr 平滑过渡 */
  .bodywrap{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .42s cubic-bezier(.22,.8,.35,1); }
  .item.open .bodywrap{ grid-template-rows:1fr; }
  .body-inner{ overflow:hidden; }
  .reps{ padding:2px 16px 13px; border-top:1px solid var(--line); background:var(--green-xl); }
  .rep{
    display:flex; align-items:center; gap:10px; padding:10px 0;
    font-size:14px; border-bottom:1px dashed var(--line);
  }
  .rep:last-child{ border-bottom:none; }
  .rep .seq{ color:var(--sub); width:50px; flex-shrink:0; font-size:13px;
             font-variant-numeric:tabular-nums; }
  .rep .tag{ padding:2px 10px; border-radius:8px; font-size:12px; font-weight:700; flex-shrink:0; }
  .rep.ok  .tag{ background:var(--green-l); color:var(--green-d); }
  .rep.bad .tag{ background:var(--amber-l); color:var(--amber); }
  .rep .reason{ flex:1; color:var(--sub); font-size:13px; }
  .rep .time{ color:#9dbfa9; font-size:12px; font-variant-numeric:tabular-nums; }

  .empty{ text-align:center; color:var(--sub); padding:52px 0 44px; font-size:14px; }
  .empty .ico{ font-size:42px; display:block; margin-bottom:12px; opacity:.55; }

  /* 删除时的收起动画 */
  .item.removing{
    animation:collapse .35s ease forwards;
  }
  @keyframes collapse{
    to{ opacity:0; transform:translateX(30px) scale(.96); max-height:0;
        margin-bottom:0; border-width:0; }
  }
</style>
</head>
<body>
  <header>
    <div class="tools">
      <button class="tbtn danger" onclick="delAll()">清空</button>
      <button class="tbtn" id="btnManage" onclick="toggleManage()">管理</button>
      <button class="tbtn" onclick="loadData()">刷新</button>
    </div>
    <h1>💪 智能健身教练</h1>
    <div class="tip">SS928 · 视觉 + IMU 多模态融合 · 云端训练档案</div>
  </header>

  <div class="summary">
    <div class="box"><div class="val" id="s-sessions">0</div><div class="lbl">训练场次</div></div>
    <div class="box"><div class="val" id="s-reps">0</div><div class="lbl">累计次数</div></div>
    <div class="box"><div class="val" id="s-time">0分</div><div class="lbl">总时长</div></div>
    <div class="box"><div class="val" id="s-rate">—</div><div class="lbl">标准率</div></div>
  </div>

  <div class="filterbar">
    <select id="filter" onchange="render()">
      <option value="all">全部动作</option>
      <option value="深蹲">深蹲</option>
      <option value="俯卧撑">俯卧撑</option>
    </select>
  </div>

  <div id="list"><div class="empty"><span class="ico">⏳</span>加载中…</div></div>

<script>
/* ── Supabase 配置(publishable key 可放前端) ── */
const SB_URL = 'https://jwjyzhnpiflnrqaquvrp.supabase.co';
const SB_KEY = 'sb_publishable_UMXycywoTqsxcG1lqBhm1Q_MDL7BjdH';

let logs = [];      // 每组汇总 workout_log
let reps = [];      // 逐次明细 workout_reps
let manage = false; // 管理(删除)模式

async function sbGet(path){
  try{
    const r = await fetch(`${SB_URL}/rest/v1/${path}`,
      { headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY } });
    return r.ok ? await r.json() : [];
  }catch{ return []; }
}
async function sbDel(path){
  try{
    const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
      method:'DELETE',
      headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, Prefer:'return=minimal' }
    });
    return r.ok;
  }catch{ return false; }
}

function fmtDur(secs){
  if(!secs || secs<=0) return '—';
  const m=Math.floor(secs/60), s=secs%60;
  return m>0 ? `${m}分${s?s+'秒':''}` : `${s}秒`;
}
function fmtClock(ts){
  if(!ts) return '';
  let n=Number(ts); if(n<1e12) n*=1000;   // 秒级时间戳转毫秒
  // 板子时钟是"本地时间当UTC存"(无时区配置), 浏览器再按本地时区偏移会多加8小时,
  // 故这里用 UTC 取时分秒, 显示的即板子上的真实本地时间
  const d=new Date(n), p=x=>String(x).padStart(2,'0');
  return `${p(d.getUTCHours())}:${p(d.getUTCMinutes())}:${p(d.getUTCSeconds())}`;
}

/* 逐次明细归组: workout_log 没有 session_id, 但同步脚本每次"先传汇总行、紧跟着传该组逐次",
 * 两者 created_at 相差仅几秒 —— 用 created_at 时间窗(±90s)+日期+动作 精确配对,
 * 避免同一天多组同动作的明细互相串组 */
const SESS_WIN_MS = 90*1000;
function repsOfLog(l){
  const t0 = Date.parse(l.created_at);
  return reps.filter(r =>
      r.date===l.date && r.action===l.action &&
      Math.abs(Date.parse(r.created_at) - t0) <= SESS_WIN_MS)
    .sort((a,b)=>(Number(a.ts)||0)-(Number(b.ts)||0));
}
function icon(action){ return action==='俯卧撑' ? '🤸' : action==='深蹲' ? '🏋️' : '💪'; }

async function loadData(){
  document.getElementById('list').innerHTML =
    '<div class="empty"><span class="ico">⏳</span>加载中…</div>';
  logs = await sbGet('workout_log?select=*&order=id.desc');
  reps = await sbGet('workout_reps?select=*&order=id.desc');
  renderSummary();
  render();
}

function renderSummary(){
  const totalReps = logs.reduce((a,l)=>a+(l.count||0),0);
  const totalSec  = logs.reduce((a,l)=>a+(l.duration_secs||0),0);
  const okReps    = reps.filter(r=>r.result==='success').length;
  document.getElementById('s-sessions').textContent = logs.length;
  document.getElementById('s-reps').textContent = totalReps;
  document.getElementById('s-time').textContent = fmtDur(totalSec);
  document.getElementById('s-rate').textContent =
    reps.length ? Math.round(okReps/reps.length*100)+'%' : '—';
}

function render(){
  const f = document.getElementById('filter').value;
  const fl = logs.filter(l => f==='all' || l.action===f);
  const box = document.getElementById('list');

  if(fl.length===0){
    box.innerHTML = '<div class="empty"><span class="ico">🗒️</span>暂无训练记录<br>去板子上练一组吧</div>';
    return;
  }

  box.innerHTML = fl.map((l,i)=>{
    // 逐次明细: created_at 时间窗精确配对本组; 按发生时间排序, 序号=第几次尝试
    // (数据里的 seq 对失败记录是"当时已计数值", 会重号/为0, 不能直接展示)
    const rs = repsOfLog(l);
    const detail = rs.length ? rs.map((r,idx)=>{
      const ok = r.result==='success';
      return `<div class="rep ${ok?'ok':'bad'}">
        <span class="seq">第${idx+1}次</span>
        <span class="tag">${ok?'标准':'未达标'}</span>
        <span class="reason">${ok?'':(r.reason||'')}</span>
        <span class="time">${fmtClock(r.ts)}</span>
      </div>`;
    }).join('') : '<div class="rep"><span class="reason">无逐次明细</span></div>';

    return `<div class="item" id="item-${l.id}" style="animation-delay:${Math.min(i*0.06,0.5)}s">
      <div class="head" onclick="toggleItem(this)">
        <div class="badge">${icon(l.action)}</div>
        <div class="info">
          <div class="name"><b>${l.action}</b> · ${l.count}个</div>
          <div class="meta">${l.date} · ${fmtDur(l.duration_secs)} · ${Math.round(l.score||0)}分</div>
        </div>
        <button class="del" onclick="delItem(event,${l.id},'${l.date}','${l.action}')">删除</button>
        <span class="chev">▼</span>
      </div>
      <div class="bodywrap"><div class="body-inner">
        <div class="reps">${detail}</div>
      </div></div>
    </div>`;
  }).join('');
}

function toggleItem(head){
  head.parentElement.classList.toggle('open');
}

function toggleManage(){
  manage = !manage;
  document.body.classList.toggle('manage', manage);
  const b = document.getElementById('btnManage');
  b.classList.toggle('on', manage);
  b.textContent = manage ? '完成' : '管理';
}

async function delItem(ev, id, date, action){
  ev.stopPropagation();                       // 不触发展开
  if(!confirm(`确定删除这条「${action}」记录吗?\n将同时删除它的逐次明细, 不可恢复`)) return;
  const btn = ev.target; btn.disabled = true; btn.textContent = '…';

  const log = logs.find(l=>l.id===id);
  const ok = await sbDel(`workout_log?id=eq.${id}`);
  if(!ok){
    btn.disabled = false; btn.textContent = '删除';
    alert('删除失败: 云端未开放删除权限\n(需在 Supabase 加 DELETE 的 RLS 策略)');
    return;
  }
  // 只删本组的逐次明细(按 id 精确删, 不误伤同一天其他组)
  const own = log ? repsOfLog(log) : [];
  if(own.length) await sbDel(`workout_reps?id=in.(${own.map(r=>r.id).join(',')})`);

  // 收起动画后再刷新本地数据
  const el = document.getElementById('item-'+id);
  if(el){ el.classList.add('removing'); await new Promise(r=>setTimeout(r,330)); }
  const ownIds = new Set(own.map(r=>r.id));
  logs = logs.filter(l=>l.id!==id);
  reps = reps.filter(r=>!ownIds.has(r.id));
  renderSummary();
  render();
}

/* 一键清空: 删除云端全部训练记录 + 全部逐次明细(双重确认) */
async function delAll(){
  if(!logs.length && !reps.length){ alert('云端已经没有记录了'); return; }
  if(!confirm(`确定清空全部记录吗?\n共 ${logs.length} 组训练、${reps.length} 条逐次明细`)) return;
  if(!confirm('再次确认: 清空后不可恢复!')) return;
  const ok1 = await sbDel('workout_log?id=gt.0');   // PostgREST 不允许无条件 DELETE, 用恒真过滤
  const ok2 = await sbDel('workout_reps?id=gt.0');
  if(!ok1 || !ok2){
    alert('清空失败: 云端未开放删除权限\n(需在 Supabase 加 DELETE 的 RLS 策略)');
    return;
  }
  logs = []; reps = [];
  renderSummary();
  render();
}

loadData();
</script>
</body>
</html>
